<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAS_DONE</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<header class="topbar">
  <span class="topbar-brand">&#9877; DAS DONE</span>
  <button class="btn btn-next-pt btn-next-pt-top" onclick="clearForNextPatient()" title="Clear all fields for the next patient encounter">&#43; Next Patient</button>
  <span id="status-message" class="status-msg">Ready.</span>
  <div class="topbar-right">
    <span id="pill-whisper" class="pill pill-off">&#127908; Whisper</span>
    <div class="model-wrap">
      <button id="pill-ollama" class="pill pill-off" onclick="toggleModelPopover()">
        &#129302; <span id="pill-model-name">Ollama</span><span id="pill-model-badge" class="badge-warn hidden">!</span>
      </button>
      <div id="model-popover" class="popover hidden">
        <div class="popover-title">Switch model</div>
        <div id="model-list"></div>
        <div id="ram-note" class="popover-note"></div>
      </div>
    </div>
    <span id="pill-oscar" class="pill pill-off">&#128196; OSCAR</span>
    <span id="el-timer" class="timer">00:00</span>
  </div>
</header>

<!-- Patient bar -->
<div class="patient-bar">
  <button class="btn-pt-import" onclick="importPatientFromClipboard()" title="Import patient info from clipboard">&#128203;</button>
  <div id="pt-paste-box" class="pt-paste-box hidden">
    <textarea id="pt-paste-area" rows="3" placeholder="Paste patient info here…
Marlow Giesecke , 20 (1/11/2005), Male
* General Appointment
Health Card: 9743702042"></textarea>
    <div class="pt-paste-actions">
      <button class="btn btn-primary btn-sm" onclick="applyPatientPaste()">Apply</button>
      <button class="btn btn-ghost btn-sm" onclick="$('pt-paste-box').classList.add('hidden')">Cancel</button>
    </div>
  </div>
  <input id="patient-name" type="text" placeholder="Patient name" autocomplete="off" />
  <input id="patient-dob" type="date" title="Date of birth" />
  <input id="health-card" type="text" placeholder="Health card #" autocomplete="off" />
  <div class="patient-bar-divider"></div>
  <input id="service-date" type="date" title="Date of service" />
  <input id="service-time" type="time" title="Start time" />
  <input id="patient-email" type="email" placeholder="Patient email" autocomplete="off" />
  <select id="visit-type" title="Visit type">
    <option value="standard" selected>Standard</option>
    <option value="counselling">Counselling</option>
  </select>
  <select id="template-select" title="Note template"></select>
  <button class="btn-link" onclick="openTemplateModal()">Templates</button>
</div>

<main class="workspace">

  <!-- LEFT PANEL -->
  <div class="left-panel">

    <!-- Patient-submitted info (optional) -->
    <div class="card">
      <label class="field-label" for="patient-submitted-info">Patient-submitted info (optional)</label>
      <textarea id="patient-submitted-info" class="patient-info-area" rows="3" placeholder="Paste any info the patient submitted here (e.g., intake form, email, etc.)"></textarea>
    </div>

    <!-- Restore last recording button -->
    <div class="card">
      <button class="btn btn-ghost btn-sm" onclick="restoreLastRecording()" title="Restore the last audio recording and note">&#8635; Restore Last Recording</button>
    </div>

    <!-- Recording -->
    <div class="card">
      <div class="waveform-dual">
        <div class="waveform-lane" style="flex-direction: row; gap: 16px;">
          <span class="waveform-label">Dr</span>
          <canvas id="waveform" width="180" height="44"></canvas>
          <span class="waveform-label">Pt</span>
          <canvas id="waveform-pt" width="180" height="44"></canvas>
        </div>
      </div>
      <div class="rec-row">
        <button id="btn-call-mode" class="btn btn-ghost btn-sm call-mode-btn call-mode-active"
          onclick="toggleCallMode()"
          title="Captures patient voice from your calling tab (e.g. Doxy.me) as a separate stereo channel — eliminates guesswork in diarization.">
          📞 Phone call: ON
        </button>
      </div>
      <div class="rec-row">
        <button id="btn-record" class="btn btn-record">&#9679; Start</button>
        <button id="btn-pause"  class="btn btn-pause hidden">&#9646;&#9646; Pause</button>
        <button id="btn-stop"   class="btn btn-stop" disabled>&#9632; Stop</button>
        <button id="btn-cancel" class="btn btn-cancel hidden" title="Cancel and discard this recording">&#10005;</button>
      </div>
      <audio id="audio-player" controls class="hidden"></audio>
      <div id="post-record-actions" class="hidden">
        <button id="btn-retranscribe" class="btn btn-ghost btn-sm">&#8635; Re-transcribe</button>
        <button id="btn-regenerate"   class="btn btn-ghost btn-sm">&#10227; Regenerate</button>
      </div>
    </div>

    <!-- Transcript -->
    <div class="card flex-grow">
      <label class="field-label">Transcript</label>
      <textarea id="transcript" class="transcript-area" placeholder="Transcript appears here after recording, or paste one..."></textarea>
      <div id="auto-generate-bar" class="auto-bar hidden">
        <span id="auto-generate-text">Generating in 3s&#8230;</span>
        <button class="btn-link" onclick="cancelAutoGenerate()">Cancel</button>
        <div class="countdown-track"><div id="countdown-progress" class="countdown-fill"></div></div>
      </div>
      <button id="btn-generate" class="btn btn-primary" disabled>&#128196; Generate SOAP Note</button>
    </div>

    <!-- Encounters (consolidated notes + audio) -->
    <div class="card history-card encounters-card">
      <div class="history-hdr">
        <div class="history-hdr-title" onclick="toggleEncounters()">
          <span class="field-label">&#128203; Encounters</span>
          <span id="history-count" class="history-badge hidden">0</span>
          <span id="audio-size" class="audio-size-label"></span>
          <span id="history-chevron" class="history-chevron">&#9660;</span>
        </div>
      </div>
      <div class="history-subhdr">
        <input type="date" id="history-date-pick" class="history-date-pick" title="Filter by date (clear for all dates)" />
        <div class="audio-hdr-actions">
          <button class="btn-link btn-link-sm" onclick="purgeAudio('orphans')" title="Delete audio files not linked to any saved note">Purge orphans</button>
          <button class="btn-link btn-link-sm danger" onclick="purgeAudio('all')" title="Delete ALL session audio files">Purge all</button>
        </div>
      </div>
      <div id="history-list" class="history-list hidden"></div>
    </div>

    <!-- Keyboard shortcuts hint -->
    <div class="kbd-hint">
      <span><kbd>Space</kbd> Rec</span>
      <span><kbd>G</kbd> Generate</span>
      <span><kbd>C</kbd> Copy</span>
      <span><kbd>/</kbd> ICD-9</span>
      <span><kbd>Esc</kbd> Cancel</span>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="card note-card">
      <div class="note-header">
        <span class="field-label">SOAP Note</span>
        <div class="note-actions">
          <button id="btn-copy"    class="btn btn-ghost btn-sm" disabled>&#128203; Copy</button>
          <button id="btn-oscar"   class="btn btn-oscar btn-sm" disabled>&#8594; OSCAR</button>
          <button id="btn-billing" class="btn btn-billing btn-sm" disabled>&#128179; Billing</button>
        </div>
      </div>
      <textarea id="note-full" class="note-area" placeholder="SOAP note will stream here as the AI generates it&#8230;&#10;&#10;Paste a transcript on the left and click Generate, or record a consultation."></textarea>
      <div id="icd9-row" class="icd9-row">
        <span class="icd9-label">ICD-9</span>
        <div id="icd9-chips" class="icd9-chips"></div>
      </div>
      <div id="billing-upgrade-bar" class="upgrade-bar hidden">
        &#9888;&#65039; Long or complex visit &mdash;
        <button class="btn-link" onclick="submitBilling()">Submit billing claim</button>
      </div>
    </div>

    <!-- ICD-9 lookup card -->
    <div class="card icd9-lookup-card">
      <div class="icd9-lookup-hdr">
        <span class="field-label">&#128270; ICD-9 Lookup</span>
        <kbd class="kbd-hint-inline">/</kbd>
      </div>
      <input id="icd9-search-input" type="text" class="icd9-search-input" placeholder="Code or description… e.g. 486, hypertension" autocomplete="off" />
      <ul id="icd9-results" class="icd9-results icd9-results-inline"></ul>
    </div>
  </div>

</main>

<!-- Template modal -->
<div id="template-modal" class="modal hidden" onclick="closeTemplateModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <h3>Note Templates</h3>
      <button class="modal-close" onclick="closeTemplateModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div id="template-list" class="tpl-list"></div>
      <hr class="divider" />
      <h4 class="section-title">New custom template</h4>
      <label class="form-label">ID (no spaces)<input id="tpl-id" placeholder="my_template" /></label>
      <label class="form-label">Name<input id="tpl-name" placeholder="My Template" /></label>
      <label class="form-label">Description<input id="tpl-desc" /></label>
      <label class="form-label">Extra system instructions<textarea id="tpl-extra" rows="3" placeholder="Additional AI instructions for this template..."></textarea></label>
      <label class="form-label">Output format (leave blank to use standard S/O/A/P)<textarea id="tpl-format" rows="5" placeholder="S:
...
O:
..."></textarea></label>
      <button class="btn btn-primary" onclick="saveCustomTemplate()">Save Template</button>
    </div>
  </div>
</div>

<script src="/static/js/socket.io.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
